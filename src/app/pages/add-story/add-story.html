<h2>Thêm truyện tranh</h2>

<form [formGroup]="addForm" (ngSubmit)="submitForm()">
  <div>
    <label>Tên truyện</label>
    <input type="text" formControlName="title" />
  </div>

  <div>
    <label>Tác giả</label>
    <input type="text" formControlName="author" />
  </div>

  <div>
    <label>Nội dung</label>
    <textarea formControlName="content"></textarea>
  </div>

  <div>
    <label>Lượt xem</label>
    <input type="number" formControlName="view" />
  </div>

  <div>
    <label>Ngày phát hành</label>
    <input type="date" formControlName="phatHanh" />
  </div>

  <div>
    <label>Thể loại</label>
    <input type="text" formControlName="theLoai" />
  </div>

  <button type="submit">Thêm truyện</button>
</form>
